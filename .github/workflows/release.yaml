on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'


jobs:
  release:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: release
        uses: softprops/action-gh-release@v1
        id: create_release
        with:
          body_path: CHANGELOG.md
          token: ${{ github.token }}
          draft: false
          prerelease: false
          files: |
            ./target/connector-aws-s3-1.0.0-SNAPSHOT-with-dependencies.jar
